<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply for Loan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="loan-box">
    <h2>Apply for a loan in minutes</h2>
    <p class="subtitle">Fill in all required details accurately. Your information is confidential and used only for loan processing.</p>
    <p class="note"><strong>Important:</strong> You must have at least 10% of the loan amount you want in your InnBucks account.</p>

    <form id="applyForm">
      <!-- Personal Details -->
      <label for="name">Full Name*</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">Phone Number*</label>
      <input type="tel" id="phone" name="phone" placeholder="0712345678" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="nationalId">National ID*</label>
      <input type="text" id="nationalId" name="nationalId" required>

      <label>Date of Birth*</label>
      <div class="dob">
        <select id="dobYear" required>
          <option value="">YYYY</option>
        </select>
        <select id="dobMonth" required>
          <option value="">MM</option>
        </select>
        <select id="dobDay" required>
          <option value="">DD</option>
        </select>
      </div>

      <!-- Employment -->
      <label for="employment">Employment Status*</label>
      <select id="employment" name="employment" required>
        <option value="">Select</option>
        <option value="Employed">Employed</option>
        <option value="Self-Employed">Self-Employed</option>
        <option value="Unemployed">Unemployed</option>
      </select>

      <!-- Loan Details -->
      <label for="amount">Loan Amount (USD)*</label>
      <input type="number" id="amount" name="amount" required>

      <label for="term">Repayment*</label>
      <select id="term" name="term" required>
        <option value="6">6 months</option>
        <option value="12">12 months</option>
        <option value="24">24 months</option>
        <option value="36">36 months</option>
        <option value="48">48 months</option>
        <option value="60">60 months</option>
      </select>

      <!-- Confirmation -->
      <div class="checkbox">
        <input type="checkbox" id="confirm" required>
        <label for="confirm">I confirm that the information provided is true and I agree to the InnBucks Loans terms and conditions.</label>
      </div>

      <!-- Buttons -->
      <div class="form-buttons">
        <button type="submit" class="apply-btn">Proceed</button>
        <button type="reset" class="reset-btn">Reset</button>
      </div>
    </form>
  </div>

  <script src="apply.js"></script>
</body>
</html>
